<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="style.css">
  <title>BoxBalance</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: #1e293b;
      padding: 25px;
      border-radius: 12px;
      width: 320px;
      text-align: center;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    h1 {
      margin-bottom: 10px;
    }

    .saldo {
      font-size: 24px;
      margin: 10px 0;
    }

    input, textarea {
      width: 100%;
      margin-top: 10px;
      padding: 8px;
      border-radius: 6px;
      border: none;
    }

    button {
      margin-top: 10px;
      padding: 10px;
      width: 48%;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }

    .entrada {
      background: #22c55e;
    }

    .saida {
      background: #ef4444;
    }

    .data {
      font-size: 14px;
      margin-bottom: 10px;
      color: #94a3b8;
    }
  </style>
</head>



<body>

<div class="container">

  <button class="btn-historico" onclick="toggleHistorico()">📜 Consultar Histórico</button>

  <button class="btn-caixa" onclick="toggleCaixa()">
    📦 Calcular Valor em Caixas
  </button>

  <h1>💰 BoxBalance</h1>

  <div class="data" id="dataHora"></div>

  <div class="saldo" id="saldo">Saldo: 0</div>

  <input type="number" id="valor" placeholder="Digite o valor">
  <textarea id="obs" placeholder="Observação..."></textarea>

  <div>
    <button class="entrada" onclick="adicionar()">+</button>
    <button class="saida" onclick="remover()">-</button>
  </div>

 
  <div id="historicoBox" class="historico hidden">
    <span class="fechar" onclick="fecharHistorico()">✖</span>
    <h3>Histórico</h3>
    <ul id="listaHistorico"></ul>
  </div>

 
  <div id="caixaBox" class="historico hidden">
    <span class="fechar" onclick="fecharCaixa()">✖</span>
    <h3>Valor em Caixas</h3>
    <input type="number" id="valorCaixa" placeholder="Valor unitário da caixa">
    <p id="resultadoCaixa"></p>
    <button onclick="calcularCaixas()">Calcular</button>
  </div>

</div>
<script src="script.js"></script>



</body>
</html>
